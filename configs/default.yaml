# Base configuration for training, validation, inference, and lightweight tracking.
# Canonical training loader knobs now live under `dataloader.*`.
# Legacy top-level `batch_size` / `num_workers` / `use_log_sampler` remain compatible
# for old experiment files, but they will emit a deprecation warning at startup.

dataloader:
  batch_size: 2
  num_workers: 8
  use_log_sampler: True
  pin_memory: True

# Experiment routing
experiment:
  name: ''
  output_root: 'outputs/experiments'
  enable_unified_dirs: False

# Dataset

dataset:
  type: 'DroneDualDataset'
  # Reserved for dataset preparation bookkeeping only. Training / validation /
  # inference read dataset.root_dir instead; tools/prepare_dronevehicle_dataset.py
  # still takes its own --raw-root CLI argument.
  raw_root: 'dataset/DroneVehicle'
  root_dir: 'dataset/DroneVehicle_process'
  split: 'train'
  imgsz: 1024
  class_names: ['car', 'truck', 'bus', 'van', 'freight_car']
  aug_cfg:
    enable_cmcp: True
    enable_mrre: True
    enable_weather: True
    enable_modality_dropout: True
    cross_modal_misalignment:
      # Simulate a mild RGB/IR registration error on one modality without
      # changing labels. Disabled by default to preserve current training.
      # apply_to supports: 'rgb', 'ir', or 'random'.
      enabled: False
      prob: 0.0
      apply_to: 'ir'
      max_translate_ratio: 0.01
      max_rotate_deg: 1.5
      max_scale_delta: 0.02
      border_mode: 'reflect'
    sensor_degradation:
      # Simulate modality-specific sensor degradation without changing labels.
      # RGB can apply overexposure / flare / haze, while IR can apply noise,
      # low-frequency drift, hotspots, and optional striping. Disabled by
      # default to preserve the current training behavior.
      enabled: False
      prob: 0.0
      rgb:
        overexposure_prob: 0.3
        flare_prob: 0.15
        haze_prob: 0.1
        max_exposure_gain: 1.4
      ir:
        noise_prob: 0.3
        noise_std: 0.03
        drift_prob: 0.2
        max_drift: 0.08
        hotspot_prob: 0.15
        stripe_prob: 0.0

# Detector model
# The maintained detector mainline is defined in configs/main/full_project.yaml
# with model.fusion.type=ReliabilityAwareFusion and model.temporal.mode=two_frame.
# This base file keeps generic defaults and compatibility fields only so older
# configs can still load without implying that detection temporal memory is the
# current mainline.
model:
  type: 'YOLODualModalOBB'
  num_classes: 5
  channels: [64, 128, 256, 512]
  # Legacy compatibility field only. Active detector configs should set this to
  # null and use model.fusion.type instead.
  fusion_att_type: 'JCA'
  norm_type: 'GN'
  use_contrastive: False

# Assigner and loss
assigner:
  type: 'DynamicTinyOBBAssigner'
  num_classes: 5
  topk: 10
  alpha: 0.5
  beta: 6.0
  temperature: 2.0
  eps: 1e-9

loss:
  type: 'UAVDualModalLoss'
  num_classes: 5
  alpha: 0.25
  gamma: 2.0
  use_scale_weight: True
  # Optional auxiliary angle supervision for the OBB angle branch.
  # Disabled by default so the training path stays equivalent to the current
  # ProbIoU-driven cls/reg baseline. When angle_weight=0, behavior remains
  # legacy-equivalent even if the flag is left on.
  angle_enabled: False
  angle_weight: 0.0
  angle_type: 'wrapped_smooth_l1'
  angle_beta: 0.1

# Training and validation
train:
  epochs: 100
  # Validation cadence. The final epoch always validates even if it does not
  # land on the interval boundary.
  eval_interval: 1
  lr: 0.001
  weight_decay: 0.0005
  lrf: 0.01
  accumulate: 8
  use_amp: True
  grad_clip: 10.0
  patience: 50
  save_dir: 'outputs/weights'

performance:
  profile_train: False
  profile_iters: 50
  profile_cuda: True
  log_interval: 10
  debug_loss_steps: 0
  debug_anomaly_steps: 5
  dataloader:
    persistent_workers: True
    prefetch_factor: 2

val:
  nms:
    conf_thres: 0.001
    iou_thres: 0.45
    max_det: 300
    max_wh: 4096.0

eval:
  # Detection evaluator selector. `gpu` is the only maintained detection
  # mainline. `cpu` is retained only as the reference / fallback path. On
  # non-CUDA devices, the factory warns and safely falls back to the CPU
  # reference evaluator instead of breaking CPU-only runs and lightweight CI.
  evaluator: 'gpu'
  # Detection-side OBB IoU backend selector. `gpu_prob` is the default backend
  # paired with the GPU evaluator, but it remains a ProbIoU surrogate rather
  # than exact polygon IoU. The CPU evaluator is reference-only and always
  # resolves to `cpu_polygon`.
  obb_iou_backend: 'gpu_prob'
  small_object:
    # Optional small-object metrics. When disabled, validation stops emitting
    # mAP_S / Recall_S / Precision_S so the metrics dict matches the config.
    enabled: True
    area_threshold: 32
    iou_threshold: 0.5
  cross_modal_robustness:
    # When enabled in validation, the evaluator runs two additional passes:
    # one with RGB dropped and one with IR dropped. Results are reported via
    # RGBOnly_mAP50 / IROnly_mAP50 / RGBDrop_mAP50 / IRDrop_mAP50 and the two
    # CrossModalRobustness_* delta fields. Keeping this disabled preserves the
    # legacy single baseline validation behavior.
    enabled: False
    base_metric: 'mAP_50'
    rgb_drop_mode: 'zero'
    ir_drop_mode: 'zero'
  error_analysis:
    # Optional detection-side post-evaluation analysis. When enabled, the
    # validator keeps normal mAP metrics and additionally exports false
    # positives / false negatives / class confusion / angle-error summaries.
    # Disabled by default to preserve the legacy validation path.
    enabled: False
    output_dir: 'outputs/error_analysis'
    export_json: True
    export_csv: True
    include_per_image: True
    confusion:
      enabled: True
    modality_contribution:
      enabled: False

# Inference toolbox
infer:
  mode: 'fast'
  conf_threshold: null
  iou_threshold: null
  # Optional per-class confidence overrides applied after OBB NMS / merge.
  # Mainline configs use dataset.class_names as keys; omitted classes fall back
  # to the global confidence threshold. An empty dict preserves legacy behavior.
  classwise_conf_thresholds: {}
  multi_scale:
    # When enabled, tools/infer.py and tools/val.py will run extra square
    # resolutions and map predictions back to dataset.imgsz before merging.
    # Keeping this disabled preserves the legacy single-scale fast path.
    enabled: False
    sizes: []
  tta:
    # When enabled together with horizontal_flip, an extra flipped pass is
    # evaluated for each active inference size. Disabled keeps legacy behavior.
    enabled: False
    horizontal_flip: False
  merge:
    # Multi-scale / TTA predictions are merged after OBB NMS using this policy.
    method: 'nms'
    iou_threshold: 0.55
    max_det: 300

# Tracking
tracking:
  enabled: False
  # Compatibility field only. The current runtime is fixed to
  # tracking_by_detection; custom values are ignored with a warning.
  method: 'tracking_by_detection'
  max_age: 30
  min_hits: 3
  init_score_threshold: 0.3
  match_iou_threshold: 0.3
  max_center_distance: 50.0
  use_class_constraint: True
  class_mismatch_penalty: 1000000.0
  use_kalman: True
  angle_smoothing: 0.7
  keep_history: 20
  appearance:
    enabled: False
    embedding_dim: 128
    update_mode: 'ema'
    history_size: 5
    ema_momentum: 0.8
    sampling_radius: 1
    use_rgb_ir_branches: False
  memory:
    # Tracking-side memory remains part of the tracking_final mainline. This is
    # unrelated to the legacy detection-side temporal memory compatibility path.
    enabled: False
    size: 5
    fusion: 'weighted_mean'
    decay: 0.8
    use_temporal_consistency: True
    lost_track_expansion: 1.25
  modality:
    enabled: False
    # Scene-adaptive weighting only affects tracking association when
    # use_modality_awareness + dynamic_weighting are already active.
    # If scene_context is empty, the tracker safely falls back to the
    # reliability-only dynamic weighting path.
    use_scene_adaptation: False
    reliability_source: 'auto'
    reliability_ema: 0.8
    night_motion_boost: 0.2
    fog_temporal_boost: 0.2
    scene_context:
      time_of_day: ''
      weather: ''
      visibility: ''
  refinement:
    enabled: False
    rescue_low_score: True
    rescue_score_threshold: 0.15
    rescue_match_iou: 0.2
    rescue_motion_gate: 0.5
    enable_track_guided_prediction: True
    max_prediction_only_steps: 2
    predicted_track_score: 0.1
    keep_small_tracked_candidates: True
    keep_tracked_overlap_candidates: True
  feature_assist:
    enabled: False
    source: 'temporal_fused'
    embedding_dim: 128
    use_for_reactivation: True
    use_for_overlap_resolution: True
    sampling_radius: 1
  reactivation:
    enabled: False
    max_reactivate_age: 8
    use_memory_reactivation: True
    use_feature_assist_reactivation: True
    reactivation_gate: 0.4
  overlap_disambiguation:
    enabled: False
    overlap_iou_threshold: 0.45
    ambiguity_margin: 0.10
    assist_margin: 0.05
  smoothing:
    enabled: False
    bbox_ema: 0.7
    angle_ema: 0.6
  association:
    use_appearance: False
    use_temporal_memory: False
    use_modality_awareness: False
    use_feature_assist: False
    dynamic_weighting: False
    w_motion: 0.25
    w_iou: 0.60
    w_app: 0.50
    w_temporal: 0.30
    w_score: 0.15
    w_assist: 0.35
    rgb_bias_gain: 0.5
    ir_bias_gain: 0.5
    low_conf_motion_boost: 0.3
    class_mismatch_penalty: 1000000.0
    appearance_gate: 0.5
    assist_gate: 0.6
    lost_track_expansion: 1.25

# Offline tracking evaluation
tracking_eval:
  enabled: False
  # Compatibility field only. MOT metrics are always computed/exported when
  # tracking evaluation runs; setting this to False is ignored with a warning.
  mot_metrics: True
  error_analysis: True
  export_results: True
  save_visualizations: False
  export_json: True
  export_csv: True
  export_mot_txt: False
  output_dir: 'outputs/tracking_eval'
  # Provide a precomputed tracking result file for tracking-only evaluation.
  # tools/val.py will not generate tracking predictions automatically when this
  # path is empty.
  results_path: ''
  gt_path: ''
  image_root: ''
  small_object_area_threshold: 32
  # Minimum observed length used by tracking analysis summaries for
  # long-track continuity / survival statistics.
  long_track_min_length: 3
  matching:
    iou_threshold: 0.5
    use_obb_iou: True
    class_aware: True
  grouped_analysis:
    enabled: True
    keys: ['time_of_day', 'weather', 'size_group']
  visualization:
    enabled: True
    draw_trails: True
    trail_length: 20
    show_state: True
