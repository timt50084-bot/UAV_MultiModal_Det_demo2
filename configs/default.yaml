# Base configuration for training, validation and inference.

batch_size: 2
num_workers: 8
use_log_sampler: True

dataset:
  type: 'DroneDualDataset'
  root_dir: 'data/drone_rgb_ir'
  split: 'train'
  imgsz: 1024
  class_names: ['car', 'truck', 'bus', 'van', 'freight_car']
  aug_cfg:
    enable_cmcp: True
    enable_mrre: True
    enable_weather: True
    enable_modality_dropout: True

model:
  type: 'YOLODualModalOBB'
  num_classes: 5
  channels: [64, 128, 256, 512]
  fusion_att_type: 'JCA'
  norm_type: 'GN'
  use_contrastive: False

assigner:
  type: 'DynamicTinyOBBAssigner'
  num_classes: 5
  topk: 10
  alpha: 0.5
  beta: 6.0
  temperature: 2.0
  eps: 1e-9

loss:
  type: 'UAVDualModalLoss'
  num_classes: 5
  alpha: 0.25
  gamma: 2.0
  use_scale_weight: True

train:
  epochs: 100
  lr: 0.001
  weight_decay: 0.0005
  lrf: 0.01
  accumulate: 8
  use_amp: True
  grad_clip: 10.0
  patience: 50
  save_dir: 'outputs/weights'

val:
  nms:
    conf_thres: 0.001
    iou_thres: 0.45
    max_det: 300
    max_wh: 4096.0
