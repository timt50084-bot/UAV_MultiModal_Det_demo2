# Legacy RDM fusion + two-frame temporal fragment kept for optional ablation scripts.

model:
  type: 'YOLODualModalOBB'
  num_classes: 5
  channels: [64, 128, 256, 512]
  fusion:
    type: 'RDMFusion'
  norm_type: 'GN'
  use_contrastive: True
  temporal:
    enabled: True
    mode: 'two_frame'
    stride: 1

loss:
  temporal_weight: 0.1
  temporal_low_motion_bias: 0.75
