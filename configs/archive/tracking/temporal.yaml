base_configs:
  - ../../main/full_project.yaml

config_meta:
  deprecated_message: 'tracking_temporal is archived for historical stage-by-stage tracking experiments. Prefer configs/main/tracking_base.yaml or configs/main/tracking_final.yaml for active work.'
  recommended_edit_path: 'configs/archive/tracking/temporal.yaml'

experiment:
  name: 'tracking_temporal'
  output_root: 'outputs/experiments'
  enable_unified_dirs: True

infer:
  mode: 'fast'

tracking:
  enabled: True
  max_age: 30
  min_hits: 3
  init_score_threshold: 0.3
  match_iou_threshold: 0.3
  max_center_distance: 50.0
  use_class_constraint: True
  class_mismatch_penalty: 1000000.0
  use_kalman: True
  angle_smoothing: 0.7
  keep_history: 20

  appearance:
    enabled: True
    embedding_dim: 128
    update_mode: 'ema'
    history_size: 5
    ema_momentum: 0.8
    sampling_radius: 1
    use_rgb_ir_branches: False

  memory:
    enabled: True
    size: 5
    fusion: 'weighted_mean'
    decay: 0.8
    use_temporal_consistency: True
    lost_track_expansion: 1.25

  modality:
    enabled: False
    use_scene_adaptation: False
    reliability_source: 'auto'
    reliability_ema: 0.8
    night_motion_boost: 0.2
    fog_temporal_boost: 0.2

  smoothing:
    enabled: True
    bbox_ema: 0.7
    angle_ema: 0.6

  association:
    use_appearance: True
    use_temporal_memory: True
    use_modality_awareness: False
    dynamic_weighting: False
    w_motion: 0.25
    w_iou: 0.60
    w_app: 0.60
    w_temporal: 0.30
    w_score: 0.15
    rgb_bias_gain: 0.5
    ir_bias_gain: 0.5
    low_conf_motion_boost: 0.3
    class_mismatch_penalty: 1000000.0
    appearance_gate: 0.5
    lost_track_expansion: 1.25
