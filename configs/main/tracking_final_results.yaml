base_configs:
  - 'tracking_final.yaml'

experiment:
  name: 'tracking_final_results'
  output_root: 'outputs/experiments'
  enable_unified_dirs: True

# Result-oriented tracking variant.
# Keeps fast tracking inference and only adds per-class confidence overrides
# before detections are passed into the tracker.
infer:
  mode: 'fast'
  # Applied after OBB NMS / merge.
  # Keys use dataset.class_names in the current mainline, not raw class ids.
  # Omitted classes fall back to the global confidence threshold.
  # Use an empty dict to keep legacy fast behavior unchanged.
  classwise_conf_thresholds:
    car: 0.20
    truck: 0.30
    bus: 0.28
