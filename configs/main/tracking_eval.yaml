base_configs:
  - full_project.yaml

experiment:
  name: 'tracking_eval'
  output_root: 'outputs/experiments'
  enable_unified_dirs: True

tracking:
  enabled: True

tracking_eval:
  enabled: True
  error_analysis: True
  export_results: True
  save_visualizations: True
  export_json: True
  export_csv: True
  export_mot_txt: True
  output_dir: 'outputs/tracking_eval'
  # This config evaluates a precomputed tracking_results.json file. It does not
  # make tools/val.py generate tracking predictions automatically.
  results_path: ''
  gt_path: ''
  image_root: ''
  small_object_area_threshold: 32
  long_track_min_length: 3
  matching:
    iou_threshold: 0.5
    use_obb_iou: True
    class_aware: True
  grouped_analysis:
    enabled: True
    keys: ['time_of_day', 'weather', 'size_group']
  visualization:
    enabled: True
    draw_trails: True
    trail_length: 20
    show_state: True
