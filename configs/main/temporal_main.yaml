base_configs:
  - full_project.yaml

experiment:
  name: 'temporal_main'
  output_root: 'outputs/experiments'
  enable_unified_dirs: True

performance:
  # Stable-first temporal training entry. Keep worker lifetime deterministic and
  # use bounded fetch waits so worker stalls fail fast instead of hanging silently.
  dataloader:
    persistent_workers: False
    prefetch_factor: 1
    timeout_seconds: 120
  temporal_debug:
    enabled: False

model:
  fusion_att_type: null
  fusion:
    type: 'SimpleConcatFusion'
  use_contrastive: False
  temporal:
    enabled: True
    mode: 'two_frame'
    consistency_feature_clip: 5.0
    consistency_level_cap: 2.0

assigner:
  lambda_theta: 0.0
  tiny_area_threshold: 0.0
  tiny_topk_boost: 0
  elongated_ratio_threshold: 1000000000.0
  use_angle_aware_assign: False

loss:
  temporal_weight: 0.1
  temporal_warmup_epochs: 2.0
  temporal_ramp_epochs: 4.0
  temporal_max_loss: 0.2
  temporal_skip_loss_threshold: 1.0
