experiment:
  name: 'full_project'
  output_root: 'outputs/experiments'
  enable_unified_dirs: True

# Daily full-project training entry.
# Most day-to-day training changes should happen in the block below.
dataloader:
  batch_size: 8
  num_workers: 8
  use_log_sampler: True
  pin_memory: True

dataset:
  root_dir: 'D:/DataSet/DroneVehicle_Processed'
  imgsz: 640

train:
  # Device selection stays in the CLI: `python tools/train.py --device 0`
  epochs: 12
  patience: 10
  lr: 0.001
  weight_decay: 0.0005
  lrf: 0.01
  accumulate: 16
  use_amp: True
  grad_clip: 10.0
  save_dir: 'outputs/weights'

performance:
  profile_train: False
  profile_iters: 50
  profile_cuda: True
  log_interval: 10
  dataloader:
    persistent_workers: True
    prefetch_factor: 2

model:
  # Final mainline: use the explicit fusion block below as the single active fusion entry.
  # The legacy fusion_att_type route is intentionally disabled here to avoid ambiguity.
  fusion_att_type: null
  use_contrastive: False
  fusion:
    type: 'ReliabilityAwareFusion'
    hidden_ratio: 0.25
    p2_boost_init: 0.1
  temporal:
    enabled: True
    mode: 'memory'
    memory_len: 3
    aggregator: 'weighted_avg'
    gate_hidden_ratio: 0.25

assigner:
  lambda_theta: 1.5
  tiny_area_threshold: 0.01
  tiny_topk_boost: 2
  elongated_ratio_threshold: 3.0
  use_angle_aware_assign: True

loss:
  temporal_weight: 0.1
  temporal_low_motion_bias: 0.75

eval:
  small_object:
    enabled: True
    area_threshold: 32
    iou_threshold: 0.5
  temporal_stability:
    enabled: 'auto'
  group_eval:
    enabled: True
    keys: ['time_of_day', 'weather', 'occlusion', 'size']
  error_analysis:
    enabled: False
