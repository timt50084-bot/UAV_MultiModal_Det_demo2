experiment:
  name: 'full_project'
  output_root: 'outputs/experiments'
  enable_unified_dirs: True

# Final full-project training entry.
# Day-to-day training changes should happen in the block below.
dataloader:
  batch_size: 4
  num_workers: 8
  use_log_sampler: True
  pin_memory: True

dataset:
  root_dir: '/root/dataset/DroneVehicle_Processed'
  # Mainline stays at 1024. If memory or throughput becomes a real constraint,
  # override at runtime with `dataset.imgsz=960` or `dataset.imgsz=800`.
  imgsz: 1024

train:
  # Device selection stays in the CLI: `python tools/train.py --device 0`
  epochs: 300
  patience: 50
  # Validation runs every N training epochs; the final epoch always validates.
  eval_interval: 5
  lr: 0.0003
  weight_decay: 0.0005
  lrf: 0.01
  accumulate: 16
  use_amp: False
  grad_clip: 10.0
  save_dir: 'outputs/weights'

performance:
  profile_train: False
  profile_iters: 50
  profile_cuda: True
  log_interval: 10
  dataloader:
    persistent_workers: True
    prefetch_factor: 2

model:
  # Final mainline: use the explicit fusion block below as the single active fusion entry.
  # The legacy fusion_att_type route is intentionally disabled here to avoid ambiguity.
  fusion_att_type: null
  use_contrastive: False
  fusion:
    type: 'ReliabilityAwareFusion'
    hidden_ratio: 0.25
    p2_boost_init: 0.1
  temporal:
    enabled: True
    mode: 'two_frame'
    consistency_feature_clip: 5.0
    consistency_level_cap: 2.0

assigner:
  lambda_theta: 1.5
  tiny_area_threshold: 0.01
  tiny_topk_boost: 2
  elongated_ratio_threshold: 3.0
  use_angle_aware_assign: True

loss:
  temporal_weight: 0.1
  temporal_low_motion_bias: 0.75
  temporal_warmup_epochs: 2.0
  temporal_ramp_epochs: 4.0
  temporal_max_loss: 0.2
  temporal_skip_loss_threshold: 1.0

eval:
  small_object:
    # When disabled, mAP_S / Recall_S / Precision_S are omitted from final
    # validation metrics instead of being reported as active outputs.
    enabled: True
    area_threshold: 32
    iou_threshold: 0.5
  temporal_stability:
    enabled: 'auto'
  group_eval:
    enabled: True
    keys: ['time_of_day', 'weather', 'occlusion', 'size']
  error_analysis:
    enabled: False
