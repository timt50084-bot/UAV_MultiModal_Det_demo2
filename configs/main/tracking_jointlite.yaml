experiment:
  name: 'tracking_jointlite'
  output_root: 'outputs/experiments'
  enable_unified_dirs: True

infer:
  mode: 'fast'

tracking:
  enabled: True
  method: 'tracking_by_detection'
  max_age: 30
  min_hits: 3
  init_score_threshold: 0.3
  match_iou_threshold: 0.3
  max_center_distance: 50.0
  use_class_constraint: True
  class_mismatch_penalty: 1000000.0
  use_kalman: True
  angle_smoothing: 0.7
  keep_history: 20

  appearance:
    enabled: True
    embedding_dim: 128
    update_mode: 'ema'
    history_size: 5
    ema_momentum: 0.8
    sampling_radius: 1
    use_rgb_ir_branches: True

  memory:
    enabled: True
    size: 5
    fusion: 'weighted_mean'
    decay: 0.8
    use_temporal_consistency: True
    lost_track_expansion: 1.25

  modality:
    enabled: True
    use_scene_adaptation: False
    reliability_source: 'auto'
    reliability_ema: 0.8
    night_motion_boost: 0.2
    fog_temporal_boost: 0.2

  refinement:
    enabled: True
    rescue_low_score: True
    rescue_score_threshold: 0.15
    rescue_match_iou: 0.2
    rescue_motion_gate: 0.5
    enable_track_guided_prediction: True
    max_prediction_only_steps: 2
    predicted_track_score: 0.1
    keep_small_tracked_candidates: True
    keep_tracked_overlap_candidates: True

  feature_assist:
    enabled: False
    source: 'temporal_fused'
    embedding_dim: 128
    use_for_reactivation: True
    use_for_overlap_resolution: True
    sampling_radius: 1

  reactivation:
    enabled: False
    max_reactivate_age: 8
    use_memory_reactivation: True
    use_feature_assist_reactivation: True
    reactivation_gate: 0.4

  overlap_disambiguation:
    enabled: False
    overlap_iou_threshold: 0.45
    ambiguity_margin: 0.10
    assist_margin: 0.05

  smoothing:
    enabled: True
    bbox_ema: 0.7
    angle_ema: 0.6

  association:
    use_appearance: True
    use_temporal_memory: True
    use_modality_awareness: True
    use_feature_assist: False
    dynamic_weighting: True
    w_motion: 0.25
    w_iou: 0.60
    w_app: 0.60
    w_temporal: 0.30
    w_score: 0.15
    w_assist: 0.35
    rgb_bias_gain: 0.5
    ir_bias_gain: 0.5
    low_conf_motion_boost: 0.3
    class_mismatch_penalty: 1000000.0
    appearance_gate: 0.5
    assist_gate: 0.6
    lost_track_expansion: 1.25

tracking_eval:
  enabled: True
  mot_metrics: True
  error_analysis: True
  export_results: True
  save_visualizations: False
  export_json: True
  export_csv: True
  export_mot_txt: False
  output_dir: 'outputs/tracking_eval'
  results_path: ''
  gt_path: ''
  image_root: ''
  small_object_area_threshold: 32
  matching:
    iou_threshold: 0.5
    use_obb_iou: True
    class_aware: True
  grouped_analysis:
    enabled: True
    keys: ['time_of_day', 'weather', 'size_group']
  visualization:
    enabled: True
    draw_trails: True
    trail_length: 20
    show_state: True
