base_configs:
  - full_project.yaml

experiment:
  name: 'tracking_base'
  output_root: 'outputs/experiments'
  enable_unified_dirs: True

infer:
  mode: 'fast'

tracking:
  enabled: True
  max_age: 30
  min_hits: 3
  init_score_threshold: 0.3
  match_iou_threshold: 0.3
  max_center_distance: 50.0
  use_class_constraint: True
  class_mismatch_penalty: 1.0
  use_kalman: True
  angle_smoothing: 0.7
  keep_history: 20
  appearance:
    enabled: False
    embedding_dim: 128
    update_mode: 'ema'
    history_size: 5
    ema_momentum: 0.8
    sampling_radius: 1
    use_rgb_ir_branches: False
  association:
    use_appearance: False
    w_motion: 0.25
    w_iou: 0.60
    w_app: 0.50
    w_score: 0.15
    class_mismatch_penalty: 1000000.0
    appearance_gate: 0.5
