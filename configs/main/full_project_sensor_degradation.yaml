base_configs:
  - 'full_project.yaml'

experiment:
  name: 'full_project_sensor_degradation'
  output_root: 'outputs/experiments'
  enable_unified_dirs: True

# Formal training variant for isolated sensor degradation simulation.
# This keeps cross-modal misalignment disabled and only enables the RGB/IR
# degradation block from the augmentation pipeline.
dataset:
  aug_cfg:
    sensor_degradation:
      enabled: True
      prob: 0.3
      rgb:
        overexposure_prob: 0.3
        flare_prob: 0.15
        haze_prob: 0.1
        max_exposure_gain: 1.4
      ir:
        noise_prob: 0.3
        noise_std: 0.03
        drift_prob: 0.2
        max_drift: 0.08
        hotspot_prob: 0.15
        stripe_prob: 0.05
