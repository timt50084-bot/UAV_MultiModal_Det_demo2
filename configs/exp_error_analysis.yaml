eval:
  enabled: True
  small_object:
    enabled: True
    area_threshold: 32
    iou_threshold: 0.5
  error_analysis:
    enabled: True
    output_dir: 'outputs/error_analysis'
    export_json: True
    export_csv: True
    include_per_image: True
    buckets:
      small_object_area_threshold: 32
      area_bins: [16, 32, 96]
      aspect_ratio_bins: [1.5, 3.0]
      dense_scene_gt_threshold: 5
    modality_contribution:
      enabled: False
    confusion:
      enabled: True
