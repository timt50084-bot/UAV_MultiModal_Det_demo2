# Dataset-only override for the processed DroneVehicle training layout.
# This file is intended to stay aligned with configs/default.yaml.

dataset:
  type: 'DroneDualDataset'
  raw_root: 'D:/DataSet/DroneVehicle'
  root_dir: 'D:/DataSet/DroneVehicle_Processed'
  split: 'train'
  imgsz: 1024
  class_names: ['car', 'truck', 'bus', 'van', 'freight_car']
  aug_cfg:
    enable_cmcp: True
    enable_mrre: True
    enable_weather: True
    enable_modality_dropout: True